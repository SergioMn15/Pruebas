<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta Pro - Aiven</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div id="vista-usuario" class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="text-center mb-4 text-primary">📝 Nueva Encuesta</h2>
                    <form id="form-encuesta">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo</label>
                            <input type="email" id="correo" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Comentario</label>
                            <textarea id="comentario" class="form-control" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enviar a la Nube</button>
                    </form>
                    <button class="btn btn-link mt-3 text-secondary" id="btn-ver-admin">Acceso Administrador</button>
                </div>
            </div>
        </div>

        <div id="vista-admin" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-dark">📊 Panel de Control</h2>
                <button class="btn btn-outline-secondary" id="btn-volver">Cerrar Sesión</button>
            </div>
            <div class="card p-3">
                <div class="table-responsive">
                    <table id="tabla-datos" class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Comentario</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
